# disable redis for unit tests
spring.cache.type=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

jwt.secret=testSecretKeyOnly
jwt.expiration.ms=3600000

rate.limit.token-bucket.capacity=5
rate.limit.token-bucket.refill-per-minute=5
rate.limit.sliding-window.max-requests=10
rate.limit.sliding-window.window-seconds=60
